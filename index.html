body{

  margin:0;

h1{

.sectionTitle{

  font-weight:bold;

  border-left:8px solid #4CAF50;
  padding-left:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:14px;
}
  
.card{
  display:block;
  background:white;
  border:2px solid #ddd;
  border-radius:10px;
  padding:10px;
  text-decoration:none;
  color:inherit;
  transition:.15s;
}

.cardTitle{
  font-size:18px;
  font-weight:bold;
  text-align:center;
}
  
.card:hover{
  transform:translateY(-3px);
  border-color:#4CAF50;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
}

@media (max-width: 600px){
  .grid{
    grid-template-columns:1fr;
  }
}
  
</style>
